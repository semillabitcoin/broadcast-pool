version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ${APP_SEMILLABITCOIN_BROADCAST_POOL_IP}
      APP_PORT: ${APP_SEMILLABITCOIN_BROADCAST_POOL_PORT}

  app:
    image: ghcr.io/semillabitcoin/broadcast-pool:v0.3.18@sha256:2ff43b77e3a216897d8e9a0704190ba977b5ba630b4f14d22ce152ee317fc640
    init: true
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "50005:50005"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      ELECTRUM_HOST: ${APP_ELECTRS_NODE_IP}
      ELECTRUM_PORT: ${APP_ELECTRS_NODE_PORT}
      DB_PATH: /data/pool.db
      WEB_PORT: "4040"
      WEB_BIND: "0.0.0.0"
      PROXY_PORT: "50005"
      APP_SEED: ${APP_SEED}
      APP_PASSWORD: ${APP_PASSWORD}
      APP_HIDDEN_SERVICE: ${APP_HIDDEN_SERVICE}
    # Reach other Umbrel apps (e.g. the price oracle) via their host-published ports.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        ipv4_address: ${APP_SEMILLABITCOIN_BROADCAST_POOL_IP}
