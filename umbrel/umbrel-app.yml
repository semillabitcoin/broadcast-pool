manifestVersion: 1
id: semillabitcoin-broadcast-pool
category: bitcoin
name: Broadcast Pool
version: "0.3.19"
tagline: Schedule Bitcoin transaction broadcasts
description: >-
  Electrum proxy that intercepts signed transactions from Sparrow, Liana or
  manual import, retains them, and broadcasts at the target block or date
  you configure. Ideal for wallet migrations and UTXO cycling with temporal
  separation.

  Compatible with Electrs and Fulcrum. Supports mainnet, testnet and signet.
  NIP-44 encrypted vault (Nostr) for confirmed transaction history.

  Inspired by Craig Raw's Broadcast Pool proposal (bitcoin/bitcoin#30471).
releaseNotes: >-
  v0.3.19 — Collections and editable labels: group retained txs by purpose
  (lending, inheritance, migration…) with color-coded chips, a picker to
  assign/create/delete collections, and inline label editing. New pool
  export format (BIP-329 dialect): unencrypted exports are standard .jsonl
  label files readable by any wallet — committed UTXOs are marked
  spendable:false so importing them into e.g. Sparrow freezes the reserved
  coins. Export the whole pool or selected collections only (hand a
  collection to another BP node). Major fix: wallet loading through the
  proxy was processing batched requests sequentially, slowing discovery to
  seconds per address with some setups — batches now run concurrently.
  Privacy-preserving diagnostics report (Settings §5): shareable, covers
  the last 10 minutes, all identifiers redacted at capture time. Passphrase
  fields no longer trigger browser password managers. Restructured tx
  table and rebuilt mobile/tablet layout.
developer: Semilla Bitcoin
