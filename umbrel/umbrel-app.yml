manifestVersion: 1
id: semillabitcoin-broadcast-pool
category: bitcoin
name: Broadcast Pool
version: "0.3.18"
tagline: Schedule Bitcoin transaction broadcasts
description: >-
  Electrum proxy that intercepts signed transactions from Sparrow, Liana or
  manual import, retains them, and broadcasts at the target block or date
  you configure. Ideal for wallet migrations and UTXO cycling with temporal
  separation.

  Compatible with Electrs and Fulcrum. Supports mainnet, testnet and signet.
  NIP-44 encrypted vault (Nostr) for confirmed transaction history.

  Inspired by Craig Raw's Broadcast Pool proposal (bitcoin/bitcoin#30471).
releaseNotes: >-
  v0.3.18 — Settings section 2 ("Comportamiento de Broadcast Pool") now
  exposes three independent nLockTime auto-broadcast toggles that only
  apply to txs intercepted via the Electrum proxy: 2.1 auto-schedule for
  future nLockTime (ON by default), 2.2 auto-broadcast for present/past
  nLockTime (OFF), and 2.3 auto-broadcast for nLockTime = 0 (OFF). Manual
  imports always land as Pending. The anti-fee-sniping warning ⚠ no longer
  appears for txs scheduled one block ahead (tip+1 now counts as future)
  or when the user has consented via the present/past toggle. Includes a
  research report on wallet anti-fee-sniping defaults under docs/.
