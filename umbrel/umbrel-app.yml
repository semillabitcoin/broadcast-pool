manifestVersion: 1
id: semillabitcoin-broadcast-pool
category: bitcoin
name: Broadcast Pool
version: "0.3.20"
tagline: Schedule Bitcoin transaction broadcasts
description: >-
  Electrum proxy that intercepts signed transactions from Sparrow, Liana or
  manual import, retains them, and broadcasts at the target block or date
  you configure. Ideal for wallet migrations and UTXO cycling with temporal
  separation.

  Compatible with Electrs and Fulcrum. Supports mainnet, testnet and signet.
  NIP-44 encrypted vault (Nostr) for confirmed transaction history.

  Inspired by Craig Raw's Broadcast Pool proposal (bitcoin/bitcoin#30471).
releaseNotes: >-
  v0.3.20 — Reliability fixes driven by the first field diagnostics
  reports. Slow Electrum servers no longer stall wallet sync: header
  downloads get a 120s budget (the previous flat 30s timeout aborted
  Sparrow's initial sync on busy nodes). The dashboard now reports real
  upstream connectivity — the status bar and connect banner reflect
  disconnects within seconds instead of showing stale state. Fixed a
  scheduler race when saving Electrum settings that logged
  "NoneType object has no attribute call". The Pool tab refreshes
  immediately when opened. Includes everything from v0.3.19:
  collections, BIP-329 export, selective export, diagnostics report,
  and the batched-request performance fix.
